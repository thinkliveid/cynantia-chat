services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cynantia
      POSTGRES_PASSWORD: cynantia
      POSTGRES_DB: cynantia
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cynantia"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # Webhook + orchestrator (specialist auto-discovered in-process dari agents_config/).
  webhook:
    build: .
    image: cynantia-chat
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://cynantia:cynantia@postgres:5432/cynantia
      GOOGLE_SERVICE_ACCOUNT_FILE: /secrets/service-account.json
    command: uvicorn cynantia_chat.chat.app:app --host 0.0.0.0 --port 8080
    volumes:
      - ./secrets:/secrets:ro
      # Tambah/ubah specialist: edit folder di agents_config/ lalu restart service ini.
      - ./agents_config:/app/agents_config:ro
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
